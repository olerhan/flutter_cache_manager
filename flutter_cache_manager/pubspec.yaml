name: flutter_cache_manager
description: Generic cache manager for flutter. Saves web files on the storages of the device and saves the cache info using sqflite.
version: 3.4.1
homepage: https://github.com/Baseflow/flutter_cache_manager/tree/develop/flutter_cache_manager
topics:
  - cache
  - cache-manager
environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  clock: ^1.1.2
  collection: ^1.19.1
  file: ^7.0.1
  flutter:
    sdk: flutter
  http: ^1.5.0
  path: ^1.9.1
  path_provider: ^2.1.5
  rxdart: ^0.28.0
  sqflite: ^2.4.2
  uuid: ^4.5.1

dev_dependencies:
  build_runner: ^2.8.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mockito: ^5.5.1

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:
